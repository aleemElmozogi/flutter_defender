name: Release Tag

on:
  push:
    branches:
      - main
      - master

concurrency:
  group: release-tag-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  verify-and-tag:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies (package)
        run: flutter pub get

      - name: Verify Android root-indicator parity
        run: python3 tool/check_android_root_path_parity.py

      - name: Analyze package
        run: flutter analyze

      - name: Run package tests
        run: flutter test

      - name: Run native HMAC-SHA256 known-answer tests
        run: |
          c++ -std=c++17 -Wall -Wextra -Werror \
            -I src/native/include \
            src/native/src/crypto/defender_crypto.cpp \
            test/native/defender_crypto_test.cpp \
            -o /tmp/flutter_defender_crypto_test
          /tmp/flutter_defender_crypto_test

      - name: Install dependencies (example)
        working-directory: example
        run: flutter pub get

      - name: Analyze example
        working-directory: example
        run: flutter analyze

      - name: Run example tests
        working-directory: example
        run: flutter test

      - name: Extract current version
        id: current_version
        run: |
          version=$(grep '^version:' pubspec.yaml | sed 's/^version:[[:space:]]*//')
          if [ -z "$version" ]; then
            echo "Could not read version from pubspec.yaml" >&2
            exit 1
          fi
          echo "value=$version" >> "$GITHUB_OUTPUT"

      - name: Check whether version is already published
        id: release_status
        env:
          PACKAGE_VERSION: ${{ steps.current_version.outputs.value }}
        run: |
          if curl --fail --silent --show-error \
            "https://pub.dev/api/packages/flutter_defender/versions/${PACKAGE_VERSION}" \
            >/dev/null 2>&1; then
            echo "Version ${PACKAGE_VERSION} is already published; no release is needed."
            echo "required=false" >> "$GITHUB_OUTPUT"
          else
            echo "Version ${PACKAGE_VERSION} is not published yet."
            echo "required=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify version bump
        if: steps.release_status.outputs.required == 'true'
        run: |
          tag="v${{ steps.current_version.outputs.value }}"
          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "Existing release tag $tag found; skipping previous-version comparison."
            exit 0
          fi
          before_sha="${{ github.event.before }}"
          if [ "$before_sha" = "0000000000000000000000000000000000000000" ]; then
            echo "Initial branch push detected; skipping previous-version comparison."
            exit 0
          fi

          git show "${before_sha}:pubspec.yaml" > /tmp/previous-pubspec.yaml
          python3 tool/check_version_bump.py /tmp/previous-pubspec.yaml pubspec.yaml

      - name: Verify or create release tag
        if: steps.release_status.outputs.required == 'true'
        env:
          RELEASE_TAG_TOKEN: ${{ secrets.RELEASE_TAG_TOKEN }}
        run: |
          tag="v${{ steps.current_version.outputs.value }}"
          if git rev-parse "$tag" >/dev/null 2>&1; then
            tagged_sha=$(git rev-list -n 1 "$tag")
            echo "Tag $tag already points to release commit $tagged_sha."
            exit 0
          fi
          if [ -z "$RELEASE_TAG_TOKEN" ]; then
            echo "Missing RELEASE_TAG_TOKEN secret." >&2
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$tag" "$GITHUB_SHA"
          git push "https://x-access-token:${RELEASE_TAG_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "$tag"
