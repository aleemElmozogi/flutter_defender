name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies (package)
        run: flutter pub get

      - name: Verify release metadata
        run: python3 tool/check_version_bump.py --check-current pubspec.yaml

      - name: Verify Android root-indicator parity
        run: python3 tool/check_android_root_path_parity.py

      - name: Analyze package
        run: flutter analyze

      - name: Run package tests
        run: flutter test

      - name: Run native HMAC-SHA256 known-answer tests
        run: |
          c++ -std=c++17 -Wall -Wextra -Werror \
            -I src/native/include \
            src/native/src/crypto/defender_crypto.cpp \
            test/native/defender_crypto_test.cpp \
            -o /tmp/flutter_defender_crypto_test
          /tmp/flutter_defender_crypto_test

      - name: Install dependencies (example)
        working-directory: example
        run: flutter pub get

      - name: Analyze example
        working-directory: example
        run: flutter analyze

      - name: Run example tests
        working-directory: example
        run: flutter test
