name: Unit tests

on:
  pull_request:
  push:
    branches:
      - main
      - master

concurrency:
  group: unit-tests-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  flutter-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies (package)
        run: flutter pub get

      - name: Run unit tests (package)
        run: flutter test

      - name: Install dependencies (example)
        working-directory: example
        run: flutter pub get

      - name: Run unit tests (example)
        working-directory: example
        run: flutter test
