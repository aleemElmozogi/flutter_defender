name: Publish to pub.dev

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies (package)
        run: flutter pub get

      - name: Verify tag matches package version
        run: |
          version=$(grep '^version:' pubspec.yaml | sed 's/^version:[[:space:]]*//')
          if [ -z "$version" ]; then
            echo "Could not read version from pubspec.yaml" >&2
            exit 1
          fi
          if [ "$GITHUB_REF_NAME" != "v${version}" ]; then
            echo "Tag $GITHUB_REF_NAME does not match pubspec.yaml version ${version}." >&2
            exit 1
          fi

      - name: Verify release metadata
        run: python3 tool/check_version_bump.py --check-current pubspec.yaml

      - name: Verify Android root-indicator parity
        run: python3 tool/check_android_root_path_parity.py

      - name: Analyze package
        run: flutter analyze

      - name: Run package tests
        run: flutter test

      - name: Run native HMAC-SHA256 known-answer tests
        run: |
          c++ -std=c++17 -Wall -Wextra -Werror \
            -I src/native/include \
            src/native/src/crypto/defender_crypto.cpp \
            test/native/defender_crypto_test.cpp \
            -o /tmp/flutter_defender_crypto_test
          /tmp/flutter_defender_crypto_test

      - name: Install dependencies (example)
        working-directory: example
        run: flutter pub get

      - name: Analyze example
        working-directory: example
        run: flutter analyze

      - name: Run example tests
        working-directory: example
        run: flutter test

  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: test
    permissions:
      id-token: write
      contents: read
    environment:
      name: pub.dev
      url: https://pub.dev/packages/flutter_defender
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Set up Dart publishing credentials
        uses: dart-lang/setup-dart@v1

      - name: Install dependencies
        run: flutter pub get

      - name: Verify package is ready to publish
        run: flutter pub publish --dry-run

      - name: Publish package
        run: flutter pub publish --force
